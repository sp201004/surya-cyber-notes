<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- dark rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="#0d1420"/>
  <!-- notebook page: bold filled neon-green rounded rect -->
  <rect x="118" y="104" width="214" height="304" rx="30" fill="#9fef00"/>
  <!-- spiral binding stripe -->
  <rect x="150" y="104" width="16" height="304" fill="#0d1420" opacity="0.28"/>
  <!-- ruled text lines (dark, chunky so they read at 16px) -->
  <rect x="188" y="168" width="120" height="22" rx="11" fill="#0d1420"/>
  <rect x="188" y="228" width="120" height="22" rx="11" fill="#0d1420"/>
  <rect x="188" y="288" width="78"  height="22" rx="11" fill="#0d1420"/>
  <!-- pen: bold diagonal, dark outline so it stands out over the page -->
  <g transform="rotate(45 356 356)">
    <rect x="330" y="238" width="52" height="196" rx="14" fill="#9fef00" stroke="#0d1420" stroke-width="16"/>
    <polygon points="330,430 382,430 356,486" fill="#9fef00" stroke="#0d1420" stroke-width="12" stroke-linejoin="round"/>
    <rect x="330" y="238" width="52" height="34" rx="10" fill="#0d1420"/>
  </g>
</svg>
