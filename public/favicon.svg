<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#9fef00" flood-opacity="0.85"/>
    </filter>
  </defs>
  <!-- dark rounded square -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="#0d1420" stroke="#233047" stroke-width="8"/>
  <g filter="url(#glow)">
    <!-- notebook cover -->
    <rect x="128" y="120" width="196" height="272" rx="22"
          fill="none" stroke="#9fef00" stroke-width="24"/>
    <!-- spiral binding spine -->
    <line x1="176" y1="120" x2="176" y2="392" stroke="#9fef00" stroke-width="14" opacity="0.85"/>
    <!-- ruled text lines -->
    <line x1="208" y1="188" x2="292" y2="188" stroke="#9fef00" stroke-width="18" stroke-linecap="round"/>
    <line x1="208" y1="240" x2="292" y2="240" stroke="#9fef00" stroke-width="18" stroke-linecap="round"/>
    <line x1="208" y1="292" x2="258" y2="292" stroke="#9fef00" stroke-width="18" stroke-linecap="round"/>
    <!-- pen / pencil writing across the lower-right -->
    <line x1="296" y1="392" x2="392" y2="286" stroke="#0d1420" stroke-width="52" stroke-linecap="round"/>
    <line x1="300" y1="388" x2="388" y2="292" stroke="#9fef00" stroke-width="26" stroke-linecap="round"/>
    <!-- pen nib -->
    <path d="M300 388 L286 420 L318 406 Z" fill="#9fef00"/>
    <!-- pen cap -->
    <line x1="380" y1="284" x2="404" y2="308" stroke="#9fef00" stroke-width="26" stroke-linecap="round"/>
  </g>
</svg>
